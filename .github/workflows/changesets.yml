name: Changesets

# Opens/updates a "Version Packages" PR whenever changesets land on main.
# Merging that PR bumps package.json + CHANGELOG.md; then tag the version to
# trigger the Release workflow. (No npm publishing — this app isn't on npm.)
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Create Version PR
        uses: changesets/action@v1
        with:
          version: npm run version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
