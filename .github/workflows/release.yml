name: Release

# Builds, signs, notarizes, and publishes a Battlify DMG when you push a tag
# like v0.1.0 (or run the workflow manually).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-15   # Apple Silicon runner with current Xcode
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f cert.p12
          # Expose the identity name for later steps.
          IDENT=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          echo "CODESIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"

      - name: Build, sign, package
        run: |
          ./scripts/package-app.sh "${{ steps.ver.outputs.version }}"
          ./scripts/make-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Notarize & staple
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: |
          echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > AuthKey.p8
          export NOTARY_KEY_PATH="$PWD/AuthKey.p8"
          ./scripts/notarize.sh "dist/Battlify-${{ steps.ver.outputs.version }}.dmg"
          rm -f AuthKey.p8

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Battlify ${{ steps.ver.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: dist/Battlify-${{ steps.ver.outputs.version }}.dmg
          draft: true        # review before going public
          generate_release_notes: true
