name: Release

# Builds Battlify on every tag push (v0.1.0…) or manual run.
# - With Apple secrets set: Developer-ID signed + notarized DMG.
# - Without them: an unsigned build (fine for testing the pipeline; end users
#   would see a Gatekeeper warning).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-15   # Apple Silicon runner
    # secrets can't be used in step `if:` directly, so surface them as env flags.
    env:
      HAS_SIGNING: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 != '' }}
      HAS_NOTARY: ${{ secrets.NOTARY_KEY_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f cert.p12
          IDENT=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
          echo "CODESIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"

      - name: Build, sign, package
        run: |
          ./scripts/package-app.sh "${{ steps.ver.outputs.version }}"
          ./scripts/make-dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Notarize & staple
        if: ${{ env.HAS_NOTARY == 'true' }}
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: |
          echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > AuthKey.p8
          export NOTARY_KEY_PATH="$PWD/AuthKey.p8"
          ./scripts/notarize.sh "dist/Battlify-${{ steps.ver.outputs.version }}.dmg"
          rm -f AuthKey.p8

      # Always make the build downloadable from the run summary.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Battlify-${{ steps.ver.outputs.version }}
          path: dist/Battlify-${{ steps.ver.outputs.version }}.dmg

      # Generate the update feed pointing at this release's DMG asset.
      - name: Generate appcast
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Battlify-${{ steps.ver.outputs.version }}.dmg"
          ./scripts/make-appcast.sh "${{ steps.ver.outputs.version }}" "$DMG_URL" "Battlify ${{ steps.ver.outputs.version }}"

      # On a tag push, attach DMG + appcast.json to a draft GitHub Release.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Battlify ${{ steps.ver.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          files: |
            dist/Battlify-${{ steps.ver.outputs.version }}.dmg
            dist/appcast.json
          draft: true
          generate_release_notes: true
